<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf7; }
        
        /* --- KEAJAIBAN CSS UNTUK PRINTER THERMAL --- */
        @media print {
            body * { visibility: hidden; } /* Sembunyikan semua UI Web */
            #print-area, #print-area * { visibility: visible; } /* Tampilkan HANYA struk */
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 58mm; /* Lebar standar kertas kasir thermal */
                padding: 0;
                margin: 0;
                font-family: 'Courier New', Courier, monospace; /* Font khas struk */
                color: black;
            }
            @page { margin: 0; } /* Hilangkan margin putih bawaan browser */
        }
    </style>
    <script>
    // --- SCRIPT SATPAM ---
    const isStaffLoggedIn = sessionStorage.getItem('is_logged_in');
    const staffRole = sessionStorage.getItem('staff_role');
    if (!isStaffLoggedIn || !staffRole) {
        window.location.replace("staff-login.html");
    }
    </script>
</head>
<body class="p-6 md:p-10 text-stone-800">

    <header class="flex justify-between items-end mb-10 border-b border-stone-200 pb-6">
        <div>
            <h1 class="text-4xl font-black tracking-tight text-[#3d2b1f]">KASIR PUSAT 💳</h1>
            <p class="text-stone-500 font-bold mt-1">Menunggu pembayaran pelanggan...</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-bold uppercase tracking-widest text-stone-400">Pemasukan Shift Ini</p>
            <h2 id="revenue" class="text-3xl font-black text-green-600">Rp0</h2>
        </div>
    </header>

    <div id="empty-state" class="flex flex-col items-center justify-center py-32 opacity-60">
        <div class="text-7xl mb-6 grayscale opacity-50">🛒</div>
        <p class="font-bold text-xl">Belum ada antrean pesanan.</p>
        <p class="text-sm text-stone-400">Pesanan dari HP pelanggan akan muncul di sini.</p>
    </div>

    <main id="cashier-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-max"></main>

    <div id="print-area" class="hidden absolute top-0 left-0 bg-white text-black p-4 text-[12px] leading-snug w-[58mm]">
        </div>

    <script>
        const socket = io();
        let totalRevenue = 0;
        let orderCount = 0;
        
        // Brankas sementara untuk menyimpan data pesanan agar bisa dicetak
        let ordersMemory = {}; 

        socket.on('new_order_to_cashier', (order) => {
            document.getElementById('empty-state').style.display = 'none';
            orderCount++;
            
            // Simpan data order ke memori kasir berdasarkan ID-nya
            ordersMemory[order.id] = order; 

            const grid = document.getElementById('cashier-grid');
            grid.innerHTML += `
                <div id="order-${order.id}" class="bg-white p-6 rounded-[2rem] shadow-xl border border-stone-100 flex flex-col justify-between transition-all animate-in fade-in zoom-in duration-300">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-stone-800">#${order.id}</h3>
                                <p class="text-[11px] font-bold text-stone-400 uppercase tracking-widest mt-1">${order.user}</p>
                            </div>
                            <span class="bg-[#3d2b1f] text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest shadow-md">Meja ${order.table}</span>
                        </div>
                        
                        <ul class="space-y-3 mb-6 border-y border-stone-100 py-4 max-h-40 overflow-y-auto">
                            ${order.items.map(i => `
                                <li class="flex justify-between text-sm">
                                    <div class="flex-1 pr-2">
                                        <span class="font-black text-stone-800 mr-1">${i.qty}x</span> 
                                        <span class="font-bold text-stone-600">${i.name}</span>
                                    </div>
                                    <span class="font-bold text-stone-800">Rp${i.total.toLocaleString()}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    
                    <div>
                        <div class="flex justify-between text-lg font-black text-orange-600 mb-5">
                            <span>TOTAL</span>
                            <span>Rp${order.total.toLocaleString()}</span>
                        </div>
                        <button onclick="payOrder('${order.id}', ${order.total}, this)" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-black tracking-widest text-xs transition-all active:scale-95 shadow-[0_10px_20px_-10px_rgba(22,163,74,0.5)]">
                            💰 TERIMA UANG & CETAK STRUK
                        </button>
                    </div>
                </div>
            `;
            
            // Bunyi notifikasi ada orderan masuk
            new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3').play();
        });

        function payOrder(id, total, btnElement) {
            // Ambil nama kasir dari memori login, jika kosong minta dia ketik manual
            let cashierName = sessionStorage.getItem('staff_username');
            if(!cashierName) cashierName = prompt("Masukkan Nama Kasir Anda:");
            if(!cashierName) return; // Batal kalau tidak diisi

            if(confirm(`Uang Rp${total.toLocaleString()} dari pesanan #${id} sudah diterima oleh ${cashierName}?`)) {
                
                // Kirim ID dan NAMA KASIR ke server
                socket.emit('confirm_payment', { id: id, cashierName: cashierName });
                
                totalRevenue += total;
                document.getElementById('revenue').innerText = 'Rp' + totalRevenue.toLocaleString();
                
                printReceipt(ordersMemory[id]);

                const card = btnElement.closest(`div[id^="order-"]`);
                card.classList.add('scale-75', 'opacity-0'); 
                setTimeout(() => {
                    card.remove();
                    orderCount--;
                    if(orderCount === 0) document.getElementById('empty-state').style.display = 'flex';
                }, 300);

                new Audio('https://assets.mixkit.co/sfx/preview/mixkit-cash-register-purchase-87.mp3').play();
            }
        }

        // FUNGSI KHUSUS MERAKIT & MENCETAK STRUK
        // FUNGSI KHUSUS MERAKIT & MENCETAK STRUK
        function printReceipt(order) {
            const printArea = document.getElementById('print-area');
            
            // Ambil nama kasir yang sedang login saat ini
            const cashierName = sessionStorage.getItem('staff_username') || "Kasir Utama";
            
            // 1. Susun rincian menu
            let itemsHtml = order.items.map(i => `
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                    <span style="width: 65%; text-align: left;">${i.qty}x ${i.name}</span>
                    <span style="width: 35%; text-align: right;">${i.total.toLocaleString()}</span>
                </div>
            `).join('');

            // 2. Suntikkan HTML ke dalam brankas print
            printArea.innerHTML = `
                <div style="text-align:center; margin-bottom:10px; border-bottom:1px dashed black; padding-bottom:10px;">
                    <h2 style="margin:0; font-size:16px; font-weight:bold;">POS KEDAI KOPI</h2>
                    <p style="margin:2px 0 0 0; font-size:10px;">Jl. Mahasiswa No. 123</p>
                </div>
                
                <div style="margin-bottom:10px; font-size:11px;">
                    <p style="margin:0;">No   : ${order.id}</p>
                    <p style="margin:0;">Kasir: ${cashierName}</p> <p style="margin:0;">Meja : ${order.table}</p>
                    <p style="margin:0;">Pelanggan : ${order.user}</p>
                    <p style="margin:0;">Waktu: ${order.time}</p>
                </div>
                
                <div style="border-top:1px dashed black; border-bottom:1px dashed black; padding: 5px 0; margin-bottom:10px;">
                    ${itemsHtml}
                </div>
                
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:11px;">
                    <span>SUBTOTAL</span>
                    <span>${order.subtotal.toLocaleString()}</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:11px;">
                    <span>PPN (10%)</span>
                    <span>${order.ppn.toLocaleString()}</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; margin-top:5px;">
                    <span>TOTAL</span>
                    <span>Rp${order.total.toLocaleString()}</span>
                </div>
                
                <div style="text-align:center; margin-top:15px; font-size:10px;">
                    <p style="margin:0;">Terima kasih atas kunjungannya!</p>
                    <p style="margin:0;">-- Powered by POS Hub --</p>
                </div>
            `;

            // 3. Tampilkan brankas sebentar -> Print -> Sembunyikan lagi
            printArea.classList.remove('hidden');
            window.print();
            printArea.classList.add('hidden');
        }
    </script>
</body>
</html>
