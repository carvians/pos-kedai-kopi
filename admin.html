<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    if (!sessionStorage.getItem('is_logged_in')) window.location.replace("staff-login.html");
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafaf9; }
        .bg-dark-mesh {
            background-color: #1c1917;
            background-image: radial-gradient(at 0% 0%, rgba(99, 72, 50, 0.2) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(212, 184, 149, 0.1) 0, transparent 50%);
        }
        .luxury-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid white; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <header class="bg-dark-mesh text-white pt-16 pb-28 px-10 rounded-b-[4rem] shadow-2xl relative overflow-hidden">
        <div class="max-w-6xl mx-auto flex justify-between items-center relative z-10">
            <div>
                <span class="text-orange-400 font-black text-[10px] uppercase tracking-[0.4em]">Administrator System</span>
                <h1 class="text-5xl font-black tracking-tighter">Executive <span class="text-orange-100">Dashboard</span> ✨</h1>
            </div>
            <button onclick="sessionStorage.clear(); location.reload();" class="bg-white/5 hover:bg-red-500/20 border border-white/10 px-8 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all">Log Out</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 -mt-12 relative z-20 space-y-8">
        
        <div class="bg-stone-900 text-white p-8 rounded-[2.5rem] shadow-2xl border border-white/5">
            <h3 class="text-2xl font-black mb-6 flex items-center gap-3">🔐 <span class="text-orange-200">Manajemen Akun Stand</span></h3>
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <input type="text" id="s-name" placeholder="Nama Stand Baru" class="flex-1 p-4 bg-white/10 rounded-2xl outline-none border border-white/10 font-bold focus:border-orange-500 transition-all">
                <input type="password" id="s-pass" placeholder="Set Password Stand" class="flex-1 p-4 bg-white/10 rounded-2xl outline-none border border-white/10 font-bold focus:border-orange-500 transition-all">
                <button onclick="createStand()" class="bg-orange-500 hover:bg-orange-600 px-10 py-4 rounded-2xl font-black tracking-widest transition-all active:scale-95 shadow-lg shadow-orange-500/20">BUAT AKUN</button>
            </div>
            <div id="stand-account-list" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="luxury-card p-8 rounded-[2.5rem]">
                <p class="text-xs font-black text-stone-400 uppercase tracking-widest mb-4">Total Omzet</p>
                <h2 id="total-sales" class="text-5xl font-black text-[#634832] tracking-tighter">Rp0</h2>
            </div>
            <div class="luxury-card p-8 rounded-[2.5rem]">
                <p class="text-xs font-black text-stone-400 uppercase tracking-widest mb-4">Total Order</p>
                <h2 id="paid-orders" class="text-5xl font-black text-stone-800 tracking-tighter">0</h2>
            </div>
        </div>

        <div class="luxury-card p-10 rounded-[3rem]">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black">Daftar Menu 📋</h3>
                <a href="/download-report" class="bg-green-600 text-white px-6 py-3 rounded-xl text-xs font-bold hover:bg-green-700 shadow-lg">📊 Download Excel</a>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="border-b">
                        <tr class="text-stone-400 text-[10px] uppercase font-black tracking-widest"><th class="pb-4">Menu</th><th class="pb-4">Stand Pemilik</th><th class="pb-4">Harga</th><th class="pb-4 text-center">Aksi</th></tr>
                    </thead>
                    <tbody id="menu-table-body" class="text-sm font-bold"></tbody>
                </table>
            </div>
        </div>

        <div class="luxury-card p-10 rounded-[3rem]">
            <h3 class="text-3xl font-black mb-8">Tambah Menu Baru 🍔</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <input type="text" id="m-name" placeholder="Nama Menu" class="w-full p-4 bg-stone-50 rounded-2xl border outline-none font-bold focus:border-stone-400 transition-all">
                    <div class="flex gap-4">
                        <input type="number" id="m-price" placeholder="Harga" class="w-1/2 p-4 bg-stone-50 rounded-2xl border outline-none font-bold">
                        <input type="number" id="m-fee" placeholder="Fee Stand" class="w-1/2 p-4 bg-stone-50 rounded-2xl border outline-none font-bold text-orange-600">
                    </div>
                    <div class="flex gap-4">
                        <select id="m-cat" class="w-1/2 p-4 bg-stone-50 rounded-2xl border font-bold">
                            <option value="makanan">🍔 Makanan</option><option value="minuman">☕ Minuman</option><option value="snacks">🍟 Snacks</option>
                        </select>
                        <select id="m-stand-select" class="w-1/2 p-4 bg-stone-50 rounded-2xl border font-bold text-orange-800">
                            </select>
                    </div>
                    <input type="text" id="m-img" placeholder="URL Link Gambar" class="w-full p-4 bg-stone-50 rounded-2xl border outline-none text-xs">
                    <button onclick="addMenu()" class="w-full bg-[#3d2b1f] text-white p-5 rounded-2xl font-black tracking-widest hover:bg-black transition-all shadow-xl">SIMPAN KE DATABASE</button>
                </div>
                <div class="bg-orange-50 rounded-[2.5rem] border border-orange-100 p-8 flex flex-col items-center justify-center text-center">
                    <div class="text-5xl mb-4">🚀</div>
                    <p class="text-sm font-bold text-orange-800 uppercase tracking-widest">Semangat Bekerja!</p>
                    <p class="text-[10px] text-orange-400 mt-2 px-6 font-bold leading-relaxed">Menu yang Anda simpan akan langsung muncul secara real-time di HP pembeli.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        socket.emit('get_stand_accounts');
        socket.emit('get_all_menu');
        socket.emit('get_admin_stats');

        function createStand() {
            const name = document.getElementById('s-name').value;
            const password = document.getElementById('s-pass').value;
            if(!name || !password) return alert("⚠️ Isi nama stand dan password!");
            socket.emit('admin_create_stand', { name, password });
            document.getElementById('s-name').value = ''; document.getElementById('s-pass').value = '';
        }

        socket.on('receive_stand_accounts', (stands) => {
            const list = document.getElementById('stand-account-list');
            const select = document.getElementById('m-stand-select');
            list.innerHTML = "";
            select.innerHTML = '<option disabled selected>-- Pilih Pemilik Stand --</option>';
            stands.forEach(s => {
                list.innerHTML += `<div class="bg-white/10 p-4 rounded-xl flex justify-between items-center border border-white/5 shadow-sm">
                    <span class="text-[11px] font-black uppercase tracking-wider">${s.name}</span>
                    <button onclick="deleteStand('${s.name}')" class="text-red-400 hover:text-red-300">🗑️</button>
                </div>`;
                select.innerHTML += `<option value="${s.name}">${s.name}</option>`;
            });
        });

        function deleteStand(name) {
            if(confirm(`Hapus akun ${name} & semua menunya?`)) socket.emit('admin_delete_stand', name);
        }

        socket.on('receive_all_menu', (menus) => {
            const tbody = document.getElementById('menu-table-body');
            tbody.innerHTML = "";
            menus.forEach(m => {
                tbody.innerHTML += `<tr class="border-b border-stone-50 hover:bg-stone-50/50 transition-colors">
                    <td class="py-4 flex items-center gap-3"><img src="${m.img}" class="w-8 h-8 rounded-lg object-cover">${m.name}</td>
                    <td class="text-orange-600 uppercase text-xs">${m.stand}</td>
                    <td>Rp${(m.price+m.fee).toLocaleString()}</td>
                    <td class="text-center"><button onclick="socket.emit('admin_delete_menu','${m._id}')" class="text-red-400">🗑️ Hapus</button></td>
                </tr>`;
            });
        });

        function addMenu() {
            const data = {
                name: document.getElementById('m-name').value, 
                price: parseInt(document.getElementById('m-price').value),
                fee: parseInt(document.getElementById('m-fee').value), 
                stand: document.getElementById('m-stand-select').value,
                cat: document.getElementById('m-cat').value, 
                img: document.getElementById('m-img').value || "https://via.placeholder.com/200"
            };
            if(!data.name || data.stand === "null") return alert("⚠️ Lengkapi data menu!");
            socket.emit('admin_add_menu', data);
        }

        socket.on('admin_update', (s) => {
            document.getElementById('total-sales').innerText = 'Rp' + s.totalSales.toLocaleString();
            document.getElementById('paid-orders').innerText = s.paidOrders;
        });

        socket.on('stand_list_updated', () => socket.emit('get_stand_accounts'));
        socket.on('menu_updated_broadcast', () => socket.emit('get_all_menu'));
        socket.on('update_status', (res) => alert(res.message));
    </script>
</body>
</html>
