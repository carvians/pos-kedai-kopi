<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    const isStaffLoggedIn = sessionStorage.getItem('is_logged_in');
    const staffRole = sessionStorage.getItem('staff_role');
    if (!isStaffLoggedIn || !staffRole) { window.location.replace("staff-login.html"); }
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf7; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4b895; border-radius: 10px; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <header class="bg-[#3d2b1f] text-white pt-12 pb-24 px-10 rounded-b-[3rem] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full blur-3xl -mr-10 -mt-10"></div>
        <div class="max-w-6xl mx-auto flex justify-between items-end relative z-10">
            <div>
                <p class="text-[10px] font-bold text-[#d4b895] uppercase tracking-[0.3em] mb-2">Portal Manajemen</p>
                <h1 class="text-4xl md:text-5xl font-black tracking-tight">Executive Dashboard ✨</h1>
            </div>
            <button onclick="logout()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-6 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all backdrop-blur-md active:scale-95">Keluar</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 -mt-12 relative z-20 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border border-white">
                <p class="text-xs font-black text-stone-400 uppercase tracking-widest mb-6">Total Omzet Keseluruhan</p>
                <h2 id="total-sales" class="text-5xl font-black text-[#634832] tracking-tighter">Rp0</h2>
            </div>
            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl border border-white">
                <p class="text-xs font-black text-stone-400 uppercase tracking-widest mb-6">Pesanan Sukses</p>
                <h2 id="paid-orders" class="text-5xl font-black text-stone-800 tracking-tighter">0 <span class="text-lg text-stone-400 font-bold tracking-normal">Order</span></h2>
            </div>
        </div>

        <div class="bg-white p-8 md:p-10 rounded-[3rem] shadow-2xl border border-stone-100 mt-10">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <h3 class="text-3xl font-black text-[#3d2b1f]">Daftar Menu & Stand 📋</h3>
                    <a href="/download-report" class="bg-green-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-green-700 transition-all shadow-lg flex items-center gap-2">
                        📊 Download Laporan Excel
                    </a>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('add-section').scrollIntoView({behavior:'smooth'})" class="bg-stone-100 text-stone-600 px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-stone-200 transition-all">+ Tambah Menu</button>
                </div>
            </div>

            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left">
                    <thead class="border-b border-stone-100">
                        <tr class="text-stone-400 text-[10px] uppercase font-black tracking-widest">
                            <th class="pb-4 px-2">Menu</th>
                            <th class="pb-4 px-2">Kategori</th>
                            <th class="pb-4 px-2">Stand</th>
                            <th class="pb-4 px-2">Harga Total</th>
                            <th class="pb-4 px-2 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="menu-table-body" class="text-sm font-bold text-stone-700">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="add-section" class="bg-white p-8 md:p-10 rounded-[3rem] shadow-2xl border border-stone-100 mt-10">
            <h3 class="text-3xl font-black mb-8 text-[#3d2b1f]">Tambah Data Baru ⚙️</h3>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                
                <div class="bg-stone-50 p-6 md:p-8 rounded-[2rem] border border-stone-200/60 space-y-4">
                    <p class="text-xs font-black text-[#634832] uppercase tracking-widest mb-2 flex items-center gap-2">
                        <span class="bg-[#634832] text-white w-5 h-5 flex justify-center items-center rounded-full text-[9px]">1</span> Tambah Menu
                    </p>
                    <input type="text" id="m-name" placeholder="Nama Menu" class="w-full p-4 bg-white rounded-2xl border border-stone-200 outline-none focus:border-[#634832] font-bold">
                    <div class="flex gap-4">
                        <input type="number" id="m-price" placeholder="Harga (Rp)" class="w-1/2 p-4 bg-white rounded-2xl border border-stone-200 outline-none">
                        <input type="number" id="m-fee" placeholder="Fee (Rp)" class="w-1/2 p-4 bg-white rounded-2xl border border-stone-200 outline-none">
                    </div>
                    <div class="flex gap-4">
                        <select id="m-cat" class="w-1/2 p-4 bg-white rounded-2xl border border-stone-200 font-bold">
                            <option value="makanan">🍔 Makanan</option>
                            <option value="minuman">☕ Minuman</option>
                            <option value="snacks">🍟 Snacks</option>
                        </select>
                        <div class="w-1/2 flex gap-2">
                            <select id="m-stand-select" onchange="checkNewStand(this.value)" class="w-full p-4 bg-white rounded-2xl border border-stone-200 font-bold text-stone-700 shadow-sm outline-none">
                                <option value="" disabled selected>Pilih Stand...</option>
                            </select>
                            <input type="text" id="m-stand-new" placeholder="Nama Stand Baru" class="hidden w-full p-4 bg-white rounded-2xl border border-stone-200 font-bold outline-none">
                        </div>
                    </div>
                    <input type="text" id="m-img" placeholder="Link Gambar (URL)" class="w-full p-4 bg-white rounded-2xl border border-stone-200 outline-none text-xs">
                    <button onclick="addNewMenu()" class="w-full bg-[#634832] text-white p-5 rounded-2xl font-black text-xs tracking-widest shadow-lg hover:bg-[#3d2b1f] active:scale-95 transition-all">SIMPAN KE DATABASE</button>
                </div>

                <div class="bg-stone-50 p-6 md:p-8 rounded-[2rem] border border-stone-200/60 space-y-4">
                    <p class="text-xs font-black text-[#634832] uppercase tracking-widest mb-2 flex items-center gap-2">
                        <span class="bg-[#634832] text-white w-5 h-5 flex justify-center items-center rounded-full text-[9px]">2</span> Keamanan
                    </p>
                    <select id="p-role" class="w-full p-4 bg-white rounded-2xl border border-stone-200 font-bold outline-none">
                        <option value="kasir">💳 Akses Kasir</option>
                        <option value="stand">👨‍🍳 Akses Stand</option>
                        <option value="admin">⚙️ Akses Admin</option>
                    </select>
                    <input type="password" id="p-new" placeholder="Password Baru" class="w-full p-4 bg-white rounded-2xl border border-stone-200 outline-none font-bold">
                    <button onclick="updatePass()" class="w-full bg-stone-800 text-white p-5 rounded-2xl font-black text-xs tracking-widest hover:bg-black transition-all">GANTI PASSWORD</button>
                </div>

            </div>
        </div>
    </main>

    <script>
        const socket = io();
        socket.emit('get_all_menu');
        socket.emit('get_admin_stats');

        // --- RENDER DAFTAR MENU KE TABEL ---
        socket.on('receive_all_menu', (menus) => {
            const tbody = document.getElementById('menu-table-body');
            const standSelect = document.getElementById('m-stand-select');
            tbody.innerHTML = "";
            
            // Update Dropdown Stand
            const uniqueStands = [...new Set(menus.map(m => m.stand))];
            standSelect.innerHTML = '<option value="" disabled selected>Pilih Stand...</option>';
            uniqueStands.forEach(s => standSelect.innerHTML += `<option value="${s}">${s}</option>`);
            standSelect.innerHTML += `<option value="NEW" class="text-orange-600 font-bold">+ Tambah Stand Baru...</option>`;

            // Update Tabel Menu
            menus.forEach(m => {
                tbody.innerHTML += `
                    <tr class="border-b border-stone-50 hover:bg-stone-50 transition-colors">
                        <td class="py-4 px-2 flex items-center gap-3">
                            <img src="${m.img}" class="w-8 h-8 rounded-lg object-cover shadow-sm">
                            ${m.name}
                        </td>
                        <td class="py-4 px-2 opacity-50 capitalize">${m.cat}</td>
                        <td class="py-4 px-2 font-black text-[#634832]">${m.stand}</td>
                        <td class="py-4 px-2">Rp${(m.price + m.fee).toLocaleString()}</td>
                        <td class="py-4 px-2 text-center">
                            <button onclick="deleteMenu('${m._id}', '${m.name}')" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white p-2 rounded-lg transition-all">
                                🗑️
                            </button>
                        </td>
                    </tr>
                `;
            });
        });

        // --- FUNGSI HAPUS ---
        function deleteMenu(id, name) {
            if(confirm(`Hapus menu "${name}" secara permanen?`)) {
                socket.emit('admin_delete_menu', id);
            }
        }

        // --- SISA FUNGSI (ADD, UPDATE, STATS) ---
        function checkNewStand(val) {
            const input = document.getElementById('m-stand-new');
            const select = document.getElementById('m-stand-select');
            if(val === "NEW") { input.classList.remove('hidden'); select.classList.add('w-1/3'); }
            else { input.classList.add('hidden'); select.classList.remove('w-1/3'); }
        }

        function addNewMenu() {
            let stand = document.getElementById('m-stand-select').value;
            if(stand === "NEW") stand = document.getElementById('m-stand-new').value;

            const data = {
                name: document.getElementById('m-name').value,
                price: parseInt(document.getElementById('m-price').value),
                fee: parseInt(document.getElementById('m-fee').value),
                stand: stand,
                cat: document.getElementById('m-cat').value,
                img: document.getElementById('m-img').value || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200"
            };
            if(!data.name || !data.stand) return alert("Lengkapi data!");
            socket.emit('admin_add_menu', data);
            alert("Menu ditambahkan!");
            location.reload();
        }

        socket.on('admin_update', (stats) => {
            document.getElementById('total-sales').innerText = 'Rp' + stats.totalSales.toLocaleString();
            document.getElementById('paid-orders').innerHTML = `${stats.paidOrders} <span class="text-sm font-bold text-stone-400">Order</span>`;
        });

        socket.on('menu_updated_broadcast', () => socket.emit('get_all_menu'));

        function updatePass() {
            const role = document.getElementById('p-role').value;
            const password = document.getElementById('p-new').value;
            if(!password) return alert("Isi password!");
            socket.emit('admin_update_password', { role, password });
            document.getElementById('p-new').value = '';
        }
        
        socket.on('update_status', (res) => alert(res.message));
        function logout() { sessionStorage.clear(); window.location.replace("staff-login.html"); }
    </script>
</body>
</html>
