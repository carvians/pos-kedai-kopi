<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    // --- SCRIPT SATPAM ---
    const isStaffLoggedIn = sessionStorage.getItem('is_logged_in');
    const staffRole = sessionStorage.getItem('staff_role');

    if (!isStaffLoggedIn || !staffRole) {
        window.location.replace("staff-login.html");
    }
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf7; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Hilangkan panah naik-turun di input number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <header class="bg-[#3d2b1f] text-white pt-12 pb-24 px-10 rounded-b-[3rem] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full blur-3xl -mr-10 -mt-10"></div>
        <div class="max-w-6xl mx-auto flex justify-between items-end relative z-10">
            <div>
                <p class="text-[10px] font-bold text-[#d4b895] uppercase tracking-[0.3em] mb-2">Portal Manajemen</p>
                <h1 class="text-4xl md:text-5xl font-black tracking-tight">Executive Dashboard ✨</h1>
            </div>
            <button onclick="logout()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-6 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all backdrop-blur-md active:scale-95">
                Keluar
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 -mt-12 relative z-20 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-8 rounded-[2.5rem] shadow-[0_10px_40px_-15px_rgba(0,0,0,0.1)] border border-white flex flex-col justify-between">
                <div class="flex justify-between items-start mb-6">
                    <p class="text-xs font-black text-stone-400 uppercase tracking-widest">Total Omzet Keseluruhan</p>
                    <div class="w-10 h-10 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">💰</div>
                </div>
                <h2 id="total-sales" class="text-5xl font-black text-[#634832] tracking-tighter">Rp0</h2>
            </div>
            
            <div class="glass-card p-8 rounded-[2.5rem] shadow-[0_10px_40px_-15px_rgba(0,0,0,0.1)] border border-white flex flex-col justify-between">
                <div class="flex justify-between items-start mb-6">
                    <p class="text-xs font-black text-stone-400 uppercase tracking-widest">Pesanan Sukses</p>
                    <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">🍽️</div>
                </div>
                <h2 id="paid-orders" class="text-5xl font-black text-stone-800 tracking-tighter">0 <span class="text-lg text-stone-400 font-bold tracking-normal">Order</span></h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-lg border border-stone-100">
                <h3 class="font-black text-xl mb-6 text-[#3d2b1f] flex items-center gap-2">
                    <span>🏢</span> Pemasukan Per Stand
                </h3>
                <div id="stand-list" class="space-y-4">
                    </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-lg border border-stone-100">
                <h3 class="font-black text-xl mb-6 text-[#3d2b1f] flex items-center gap-2">
                    <span>🔥</span> Menu Terlaris
                </h3>
                <div id="item-list" class="space-y-4">
                    </div>
            </div>
        </div>

        <div class="bg-white p-8 md:p-10 rounded-[3rem] shadow-2xl border border-stone-100 mt-10 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-orange-50 rounded-bl-[100px] -z-0"></div>
            
            <h3 class="text-3xl font-black mb-8 text-[#3d2b1f] relative z-10">Pengaturan Kedai ⚙️</h3>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-10">
                
                <div class="bg-stone-50 p-6 md:p-8 rounded-[2rem] border border-stone-200/60">
                    <p class="text-xs font-black text-[#634832] uppercase tracking-widest mb-6 flex items-center gap-2">
                        <span class="bg-[#634832] text-white w-6 h-6 flex justify-center items-center rounded-full text-[10px]">1</span> Tambah Menu Baru
                    </p>
                    <div class="space-y-4">
                        <input type="text" id="m-name" placeholder="Nama Makanan/Minuman" class="w-full p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm">
                        
                        <div class="flex gap-4">
                            <input type="number" id="m-price" placeholder="Harga Dasar (Rp)" class="w-1/2 p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm">
                            <input type="number" id="m-fee" placeholder="Fee Stand (Rp)" class="w-1/2 p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm">
                        </div>
                        
                        <div class="flex gap-4">
                            <select id="m-cat" class="w-1/2 p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm">
                                <option value="makanan">🍔 Makanan</option>
                                <option value="minuman">☕ Minuman</option>
                                <option value="snacks">🍟 Snacks</option>
                            </select>
                            <input type="text" id="m-stand" placeholder="Nama Stand" class="w-1/2 p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm">
                        </div>
                        
                        <input type="text" id="m-img" placeholder="Link Gambar (URL)" class="w-full p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm text-xs">
                        
                        <button onclick="addNewMenu()" class="w-full bg-[#634832] text-white p-5 rounded-2xl font-black tracking-widest text-sm shadow-[0_10px_20px_-10px_rgba(99,72,50,0.5)] hover:bg-[#3d2b1f] active:scale-95 transition-all mt-2">
                            SIMPAN KE DATABASE
                        </button>
                    </div>
                </div>

                <div class="bg-stone-50 p-6 md:p-8 rounded-[2rem] border border-stone-200/60">
                    <p class="text-xs font-black text-[#634832] uppercase tracking-widest mb-6 flex items-center gap-2">
                        <span class="bg-[#634832] text-white w-6 h-6 flex justify-center items-center rounded-full text-[10px]">2</span> Keamanan Akun Staff
                    </p>
                    <div class="space-y-4">
                        <select id="p-role" class="w-full p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm">
                            <option value="kasir">💳 Akses Kasir</option>
                            <option value="stand">👨‍🍳 Akses Dapur/Stand</option>
                            <option value="admin">⚙️ Akses Administrator</option>
                        </select>
                        
                        <input type="password" id="p-new" placeholder="Ketik Password Baru..." class="w-full p-4 bg-white rounded-2xl outline-none border border-stone-200 focus:border-[#634832] focus:ring-4 focus:ring-[#634832]/10 transition-all font-bold text-stone-700 shadow-sm">
                        
                        <button onclick="updatePass()" class="w-full bg-stone-800 text-white p-5 rounded-2xl font-black tracking-widest text-sm shadow-xl hover:bg-black active:scale-95 transition-all mt-2">
                            PERBARUI PASSWORD
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const socket = io();
        socket.emit('get_admin_stats');

        socket.on('admin_update', (stats) => {
            // Update Angka dengan animasi lembut
            document.getElementById('total-sales').innerText = 'Rp' + stats.totalSales.toLocaleString();
            document.getElementById('paid-orders').innerHTML = `${stats.paidOrders} <span class="text-lg text-stone-400 font-bold tracking-normal">Order</span>`;

            // Render Stand Revenue
            const standList = document.getElementById('stand-list');
            standList.innerHTML = "";
            if (Object.keys(stats.standRevenue).length === 0) {
                standList.innerHTML = `<p class="text-sm text-stone-400 italic">Belum ada data pemasukan.</p>`;
            }
            for(let stand in stats.standRevenue) {
                standList.innerHTML += `
                    <div class="flex justify-between items-center bg-stone-50 p-4 rounded-2xl border border-stone-100">
                        <span class="font-bold text-stone-600 text-sm">${stand}</span>
                        <span class="font-black text-[#634832]">Rp${stats.standRevenue[stand].toLocaleString()}</span>
                    </div>`;
            }

            // Render Top Items
            const itemList = document.getElementById('item-list');
            itemList.innerHTML = "";
            if (Object.keys(stats.topItems).length === 0) {
                itemList.innerHTML = `<p class="text-sm text-stone-400 italic">Belum ada data penjualan menu.</p>`;
            }
            for(let item in stats.topItems) {
                itemList.innerHTML += `
                    <div class="flex justify-between items-center bg-stone-50 p-4 rounded-2xl border border-stone-100">
                        <span class="font-bold text-stone-600 text-sm">${item}</span>
                        <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-lg font-black text-[10px] tracking-widest uppercase">${stats.topItems[item]} Terjual</span>
                    </div>`;
            }
        });

        // FUNGSI ADMIN DATABASE
        function addNewMenu() {
            const data = {
                name: document.getElementById('m-name').value,
                price: parseInt(document.getElementById('m-price').value),
                fee: parseInt(document.getElementById('m-fee').value),
                stand: document.getElementById('m-stand').value,
                img: document.getElementById('m-img').value || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200", 
                cat: document.getElementById('m-cat').value
            };
            
            if(!data.name || !data.stand || isNaN(data.price) || isNaN(data.fee)) {
                return alert("⚠️ Mohon lengkapi semua kolom dengan benar!");
            }
            
            socket.emit('admin_add_menu', data);
            alert("✅ Menu berhasil ditambahkan ke Database!");
            
            // Kosongkan form setelah input
            document.getElementById('m-name').value = '';
            document.getElementById('m-price').value = '';
            document.getElementById('m-fee').value = '';
            document.getElementById('m-stand').value = '';
            document.getElementById('m-img').value = '';
        }

        function updatePass() {
            const role = document.getElementById('p-role').value;
            const password = document.getElementById('p-new').value;
            
            if(!password) return alert("⚠️ Password baru tidak boleh kosong!");
            
            socket.emit('admin_update_password', { role, password });
            document.getElementById('p-new').value = '';
        }
        
        socket.on('update_status', (res) => alert(res.success ? "✅ " + res.message : "❌ " + res.message));

        function logout() {
            sessionStorage.clear();
            window.location.replace("staff-login.html");
        }
    </script>
</body>
</html>
