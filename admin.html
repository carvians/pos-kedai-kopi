<!DOCTYPE html>
<html lang="id">
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    // --- SCRIPT SATPAM (HARUS PALING ATAS) ---
    const isStaffLoggedIn = sessionStorage.getItem('is_logged_in');
    const staffRole = sessionStorage.getItem('staff_role');

    // Jika belum login, tendang ke halaman login
    if (!isStaffLoggedIn || !staffRole) {
        window.location.replace("staff-login.html");
    }
    // (Opsional) Jika kasir nyasar ke halaman admin, tendang juga
    // if (staffRole !== 'admin') window.location.replace("staff-login.html");
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-50 p-10 font-['Plus_Jakarta_Sans']">
    <h1 class="text-4xl font-black mb-10 text-stone-800">REKAP PENJUALAN 📈</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-stone-200">
            <p class="text-xs font-bold text-stone-400 uppercase">Total Omzet</p>
            <h2 id="total-sales" class="text-4xl font-black text-green-600">Rp0</h2>
        </div>
        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-stone-200">
            <p class="text-xs font-bold text-stone-400 uppercase">Pesanan Sukses</p>
            <h2 id="paid-orders" class="text-4xl font-black text-stone-800">0</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
        <div class="bg-white p-8 rounded-[3rem] shadow-xl">
            <h3 class="font-black text-xl mb-6">Pemasukan Per Stand</h3>
            <div id="stand-list" class="space-y-4"></div>
        </div>
        <div class="bg-white p-8 rounded-[3rem] shadow-xl">
            <h3 class="font-black text-xl mb-6">Menu Terlaris</h3>
            <div id="item-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const socket = io();
        socket.emit('get_admin_stats');

        socket.on('admin_update', (stats) => {
            document.getElementById('total-sales').innerText = 'Rp' + stats.totalSales.toLocaleString();
            document.getElementById('paid-orders').innerText = stats.paidOrders;

            // Render Stand Revenue
            const standList = document.getElementById('stand-list');
            standList.innerHTML = "";
            for(let stand in stats.standRevenue) {
                standList.innerHTML += `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-stone-600">${stand}</span>
                        <span class="font-black">Rp${stats.standRevenue[stand].toLocaleString()}</span>
                    </div>`;
            }

            // Render Top Items
            const itemList = document.getElementById('item-list');
            itemList.innerHTML = "";
            for(let item in stats.topItems) {
                itemList.innerHTML += `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-stone-600">${item}</span>
                        <span class="bg-stone-100 px-3 py-1 rounded-full font-black text-xs">${stats.topItems[item]} Terjual</span>
                    </div>`;
            }
        });
    </script>
</body>
</html>
