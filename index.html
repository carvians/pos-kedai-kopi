<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Kedai Kopi & Foodcourt</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf7; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .active-tab { background: #634832 !important; color: white !important; transform: scale(1.05); }
        .active-stand { background: #634832 !important; color: white !important; border-color: #634832 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .stand-badge {
            background: #f3f0ec;
            color: #634832;
            font-size: 9px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 99px;
            display: inline-block;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="pb-32">
    <header class="p-8 bg-[#634832] text-white rounded-b-[40px] shadow-2xl mb-6 transition-all">
        <p class="text-[10px] uppercase tracking-widest opacity-60">Pesanan Untuk</p>
        <h1 class="text-2xl font-extrabold">
            <span id="display-name" class="capitalize">User</span> @ Meja <span id="table-num">00</span> ✨
        </h1>
    </header>

    <nav class="flex gap-3 px-6 mb-4 overflow-x-auto no-scrollbar">
        <button onclick="renderMenu('makanan')" class="cat-btn active-tab px-6 py-2 rounded-2xl bg-white border border-stone-200 font-bold text-sm shadow-sm transition-all whitespace-nowrap">🍔 Makanan</button>
        <button onclick="renderMenu('minuman')" class="cat-btn px-6 py-2 rounded-2xl bg-white border border-stone-200 font-bold text-sm shadow-sm transition-all whitespace-nowrap">☕ Minuman</button>
        <button onclick="renderMenu('snacks')" class="cat-btn px-6 py-2 rounded-2xl bg-white border border-stone-200 font-bold text-sm shadow-sm transition-all whitespace-nowrap">🍟 Snacks</button>
    </nav>

    <div class="px-6 mb-8">
        <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3 ml-1">Pilih Berdasarkan Stand</p>
        <div id="stand-list" class="flex gap-2 overflow-x-auto no-scrollbar">
            </div>
    </div>

    <main id="menu-area" class="px-6 grid gap-6">
        </main>

    <div id="under-construction" class="hidden flex flex-col items-center py-20 opacity-80 text-center">
        <div class="text-7xl animate-bounce mb-4 text-stone-300">🏗️</div>
        <h3 class="font-bold text-stone-800">Sabar Ya, Kak!</h3>
        <p class="text-xs text-stone-500 max-w-[200px]">Menu ini lagi disiapin koki kita yang paling jago.</p>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md">
        <div class="glass p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center border border-white">
            <div>
                <p class="text-[10px] text-stone-400 uppercase font-bold">Total Tagihan</p>
                <p id="total-txt" class="text-xl font-extrabold text-[#3d2b1f]">Rp0</p>
            </div>
            <button onclick="checkout()" class="bg-[#3d2b1f] text-white px-8 py-4 rounded-[1.8rem] font-bold shadow-lg active:scale-95 transition-all">PESAN SEKARANG</button>
        </div>
    </div>

    <script>
        const socket = io();
        
        const customerName = sessionStorage.getItem('customer_name');
        const tableNumber = sessionStorage.getItem('table_number');

        if (!customerName || !tableNumber) {
            window.location.href = "login.html";
        } else {
            document.getElementById('display-name').innerText = customerName;
            document.getElementById('table-num').innerText = tableNumber;
        }

        let cart = [];
        
        const menuData = [
            { id:1, name: "Iced Latte", price: 25000, fee: 2000, cat: "minuman", img: "https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=200", stand: "O-Coffee Stand" },
            { id:2, name: "Nasi Goreng Special", price: 30000, fee: 3000, cat: "makanan", img: "https://images.unsplash.com/photo-1512058560566-427a1bd5a560?w=200", stand: "Dapur Mamah" },
            { id:3, name: "Es Teh Manis", price: 5000, fee: 1000, cat: "minuman", img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=200", stand: "O-Coffee Stand" },
            { id:4, name: "Ayam Goreng", price: 22000, fee: 2000, cat: "makanan", img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=200", stand: "Dapur Mamah" }
        ];

        // 1. Fungsi Otomatis Membuat Tombol Stand
        function initStandFilters() {
            const standList = document.getElementById('stand-list');
            const uniqueStands = [...new Set(menuData.map(m => m.stand))];
            
            standList.innerHTML = "";
            uniqueStands.forEach(stand => {
                const btn = document.createElement('button');
                btn.className = "stand-filter-btn px-4 py-2 rounded-xl bg-white border border-stone-200 text-stone-600 font-bold text-[10px] uppercase tracking-tighter transition-all whitespace-nowrap shadow-sm";
                btn.innerText = "🏢 " + stand;
                btn.onclick = (e) => filterByStand(stand, e.target);
                standList.appendChild(btn);
            });
        }

        // 2. Fungsi Filter Berdasarkan Stand
        function filterByStand(standName, element) {
            // Reset tab kategori (opsional, agar tidak bingung)
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-tab'));
            
            // Highlight tombol stand yang dipilih
            document.querySelectorAll('.stand-filter-btn').forEach(b => b.classList.remove('active-stand'));
            element.classList.add('active-stand');

            const items = menuData.filter(m => m.stand === standName);
            renderItems(items);
        }

        // 3. Fungsi Filter Berdasarkan Kategori
        function renderMenu(cat) {
            document.querySelectorAll('.stand-filter-btn').forEach(b => b.classList.remove('active-stand'));
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('active-tab');
                if(b.innerText.toLowerCase().includes(cat)) b.classList.add('active-tab');
            });

            const items = menuData.filter(m => m.cat === cat);
            renderItems(items);
        }

        // 4. Fungsi Utama Menampilkan Item
        function renderItems(items) {
            const container = document.getElementById('menu-area');
            const uc = document.getElementById('under-construction');
            container.innerHTML = "";

            if(items.length === 0) {
                uc.classList.remove('hidden');
            } else {
                uc.classList.add('hidden');
                items.forEach(m => {
                    container.innerHTML += `
                    <div class="bg-white p-4 rounded-[2rem] flex items-center shadow-sm border border-stone-100 animate-in fade-in slide-in-from-bottom-4 duration-300">
                        <img src="${m.img}" class="w-20 h-20 rounded-2xl object-cover shadow-sm">
                        <div class="ml-4 flex-1">
                            <div class="stand-badge">${m.stand}</div>
                            <h4 class="font-bold text-stone-800 leading-tight">${m.name}</h4>
                            <p class="text-[10px] text-stone-400 mb-1">Rp${m.price.toLocaleString()}</p>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-[#634832]">Rp${(m.price + m.fee).toLocaleString()}</span>
                                <button onclick="addToCart('${m.name}', ${m.price+m.fee}, '${m.stand}')" class="w-10 h-10 bg-stone-100 rounded-2xl flex items-center justify-center font-bold text-xl active:bg-stone-200 active:scale-90 transition-all text-stone-600 shadow-inner">+</button>
                            </div>
                        </div>
                    </div>`;
                });
            }
        }

        function addToCart(name, total, stand) {
            cart.push({name, total, stand});
            const sum = cart.reduce((a, b) => a + b.total, 0);
            document.getElementById('total-txt').innerText = `Rp${sum.toLocaleString()}`;
        }

        function checkout() {
            if(cart.length === 0) return alert("Keranjang masih kosong!");
            const id = "ORD-" + Date.now().toString().slice(-4);
    
    // Hitung Subtotal, PPN 11%, dan Grand Total
            const subtotal = cart.reduce((a, b) => a + b.total, 0);
            const ppn = subtotal * 0.11; // PPN 11%
            const grandTotal = subtotal + ppn;

    // Kirim data ke server (Kasir akan menerima Grand Total)
            socket.emit('submit_order', { 
                id: id, items: cart, table: tableNumber, user: customerName,
                total: grandTotal 
            });

    // Simpan semua data ke memori untuk ditampilkan di halaman Timer
            sessionStorage.setItem('last_order_id', id);
            sessionStorage.setItem('last_order_items', JSON.stringify(cart)); // Simpan rincian item
            sessionStorage.setItem('last_order_subtotal', subtotal);
            sessionStorage.setItem('last_order_ppn', ppn);
            sessionStorage.setItem('last_order_total', grandTotal);

            window.location.href = "checkout-pending.html";
        }


        // Inisialisasi
        initStandFilters();
        renderMenu('makanan');
    </script>
</body>
</html>
