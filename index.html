<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Kedai Kopi & Foodcourt</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf7; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .active-tab { background: #634832 !important; color: white !important; transform: scale(1.05); }
        .active-stand { background: #634832 !important; color: white !important; border-color: #634832 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .stand-badge {
            background: #f3f0ec;
            color: #634832;
            font-size: 9px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 99px;
            display: inline-block;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        #cart-modal { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-32">
    <header class="p-8 bg-[#634832] text-white rounded-b-[40px] shadow-2xl mb-6 transition-all">
        <p class="text-[10px] uppercase tracking-widest opacity-60">Pesanan Untuk</p>
        <h1 class="text-2xl font-extrabold">
            <span id="display-name" class="capitalize">User</span> @ Meja <span id="table-num">00</span> ✨
        </h1>
    </header>

    <nav class="flex gap-3 px-6 mb-4 overflow-x-auto no-scrollbar">
        <button onclick="renderMenu('makanan')" class="cat-btn active-tab px-6 py-2 rounded-2xl bg-white border border-stone-200 font-bold text-sm shadow-sm transition-all whitespace-nowrap">🍔 Makanan</button>
        <button onclick="renderMenu('minuman')" class="cat-btn px-6 py-2 rounded-2xl bg-white border border-stone-200 font-bold text-sm shadow-sm transition-all whitespace-nowrap">☕ Minuman</button>
        <button onclick="renderMenu('snacks')" class="cat-btn px-6 py-2 rounded-2xl bg-white border border-stone-200 font-bold text-sm shadow-sm transition-all whitespace-nowrap">🍟 Snacks</button>
    </nav>

    <div class="px-6 mb-8">
        <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3 ml-1">Pilih Berdasarkan Stand</p>
        <div id="stand-list" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
    </div>

    <main id="menu-area" class="px-6 grid gap-6"></main>

    <div id="under-construction" class="hidden flex flex-col items-center py-20 opacity-80 text-center">
        <div class="text-7xl animate-bounce mb-4 text-stone-300">🏗️</div>
        <h3 class="font-bold text-stone-800">Sabar Ya, Kak!</h3>
        <p class="text-xs text-stone-500 max-w-[200px]">Menu ini lagi disiapin koki kita yang paling jago.</p>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-40">
        <div class="glass p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center border border-white">
            <div onclick="toggleModal()" class="cursor-pointer active:scale-95 transition-transform">
                <p class="text-[10px] text-stone-400 uppercase font-bold flex items-center gap-1">
                    Lihat Detail <span class="text-[8px]">▲</span>
                </p>
                <p id="total-txt" class="text-xl font-extrabold text-[#3d2b1f]">Rp0</p>
            </div>
            <button onclick="checkout()" class="bg-[#3d2b1f] text-white px-8 py-4 rounded-[1.8rem] font-bold shadow-lg active:scale-95 transition-all">PESAN SEKARANG</button>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm">
        <div onclick="toggleModal()" class="absolute inset-0"></div> 
        <div class="modal-content bg-white w-full max-w-md rounded-t-[3rem] p-8 relative shadow-2xl">
            <div class="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-6"></div>
            
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-extrabold text-stone-800 tracking-tight">Review Pesanan</h3>
                <button onclick="toggleModal()" class="text-stone-400 text-sm font-bold">Tutup</button>
            </div>
            
            <div id="cart-items-list" class="max-h-64 overflow-y-auto space-y-3 mb-6 no-scrollbar"></div>

            <div class="border-t border-stone-100 pt-5 mb-8 space-y-2">
                <div class="flex justify-between text-stone-400 text-xs font-bold uppercase tracking-wider">
                    <span>Subtotal</span>
                    <span id="modal-subtotal">Rp0</span>
                </div>
                <div class="flex justify-between text-stone-400 text-xs font-bold uppercase tracking-wider">
                    <span>Pajak (10%)</span>
                    <span id="modal-ppn">Rp0</span>
                </div>
                <div class="flex justify-between font-extrabold text-xl text-[#3d2b1f] pt-2">
                    <span>Total Bayar</span>
                    <span id="modal-total-price">Rp0</span>
                </div>
            </div>

            <button onclick="checkout()" class="w-full bg-[#3d2b1f] text-white p-5 rounded-3xl font-bold shadow-lg active:scale-95 transition-all">
                KONFIRMASI & PESAN
            </button>
        </div>
    </div>

    <script>
        // --- LOGIKA PENGAMAN: Jika sudah lunas, tendang balik ke login ---
        if (sessionStorage.getItem('payment_status') === 'done') {
            sessionStorage.clear();
            window.location.href = "login.html";
        }

        const socket = io();
        
        const customerName = sessionStorage.getItem('customer_name');
        const tableNumber = sessionStorage.getItem('table_number');

        if (!customerName || !tableNumber) {
            window.location.href = "login.html";
        } else {
            document.getElementById('display-name').innerText = customerName;
            document.getElementById('table-num').innerText = tableNumber;
        }

        let cart = [];
        let menuData = []; 

        socket.emit('get_all_menu');
        
        socket.on('receive_all_menu', (data) => {
            menuData = data;
            initStandFilters();
            renderMenu('makanan'); 
        });

        socket.on('menu_updated_broadcast', () => {
            socket.emit('get_all_menu'); 
        });

        function initStandFilters() {
            const standList = document.getElementById('stand-list');
            const uniqueStands = [...new Set(menuData.map(m => m.stand))];
            
            standList.innerHTML = "";
            uniqueStands.forEach(stand => {
                const btn = document.createElement('button');
                btn.className = "stand-filter-btn px-4 py-2 rounded-xl bg-white border border-stone-200 text-stone-600 font-bold text-[10px] uppercase tracking-tighter transition-all whitespace-nowrap shadow-sm";
                btn.innerText = "🏢 " + stand;
                btn.onclick = (e) => filterByStand(stand, e.target);
                standList.appendChild(btn);
            });
        }

        function filterByStand(standName, element) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-tab'));
            document.querySelectorAll('.stand-filter-btn').forEach(b => b.classList.remove('active-stand'));
            element.classList.add('active-stand');

            const items = menuData.filter(m => m.stand === standName);
            renderItems(items);
        }

        function renderMenu(cat) {
            document.querySelectorAll('.stand-filter-btn').forEach(b => b.classList.remove('active-stand'));
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('active-tab');
                if(b.innerText.toLowerCase().includes(cat)) b.classList.add('active-tab');
            });

            const items = menuData.filter(m => m.cat === cat);
            renderItems(items);
        }

        function renderItems(items) {
            const container = document.getElementById('menu-area');
            const uc = document.getElementById('under-construction');
            container.innerHTML = "";

            if(items.length === 0) {
                uc.classList.remove('hidden');
            } else {
                uc.classList.add('hidden');
                items.forEach(m => {
                    container.innerHTML += `
                    <div class="bg-white p-4 rounded-[2rem] flex items-center shadow-sm border border-stone-100 animate-in fade-in slide-in-from-bottom-4 duration-300">
                        <img src="${m.img}" class="w-20 h-20 rounded-2xl object-cover shadow-sm">
                        <div class="ml-4 flex-1">
                            <div class="stand-badge">${m.stand}</div>
                            <h4 class="font-bold text-stone-800 leading-tight text-sm">${m.name}</h4>
                            <p class="text-[9px] text-stone-400">Rp${m.price.toLocaleString()}</p>
                            <div class="flex justify-between items-center mt-1">
                                <span class="font-bold text-[#634832] text-sm">Rp${(m.price + m.fee).toLocaleString()}</span>
                                <button onclick="addToCart('${m.name}', ${m.price+m.fee}, '${m.stand}')" class="w-10 h-10 bg-stone-100 rounded-2xl flex items-center justify-center font-bold text-xl active:scale-90 transition-all text-stone-600 shadow-inner">+</button>
                            </div>
                        </div>
                    </div>`;
                });
            }
        }

        function addToCart(name, price, stand) {
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ name: name, price: price, stand: stand, qty: 1 });
            }
            updateTotalBar();
        }

        function updateTotalBar() {
            const sum = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('total-txt').innerText = `Rp${sum.toLocaleString()}`;
        }

        function toggleModal() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) renderCartItems();
        }

        function renderCartItems() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = "";

            if (cart.length === 0) {
                list.innerHTML = "<div class='text-center py-10 opacity-30 text-xs font-bold'>KERANJANG KOSONG</div>";
                document.getElementById('modal-subtotal').innerText = "Rp0";
                document.getElementById('modal-ppn').innerText = "Rp0";
                document.getElementById('modal-total-price').innerText = "Rp0";
                return;
            }

            cart.forEach((item, index) => {
                const rowTotal = item.price * item.qty;
                const noteVal = item.note ? item.note : ""; 

                list.innerHTML += `
                <div class="flex justify-between items-start bg-stone-50 p-4 rounded-2xl border border-stone-100">
                    <div class="flex-1 pr-4">
                        <p class="font-bold text-stone-800 text-xs">${item.name}</p>
                        <p class="text-[9px] text-stone-400 uppercase mb-2">${item.stand}</p>
                        
                        <input type="text" placeholder="Catatan (Opsional)..." value="${noteVal}" onchange="updateNote(${index}, this.value)" class="w-full bg-transparent border-b border-stone-200 text-[10px] focus:outline-none focus:border-[#634832] pb-1 text-stone-600 placeholder-stone-300 italic">
                    </div>

                    <div class="flex flex-col items-end gap-3">
                        <span class="font-bold text-[#634832] text-xs font-mono">Rp${rowTotal.toLocaleString()}</span>
                        
                        <div class="flex items-center gap-2 bg-white border border-stone-200 rounded-lg p-1 shadow-sm">
                            <button onclick="reduceFromCart(${index})" class="w-6 h-6 bg-stone-100 hover:bg-stone-200 text-stone-600 rounded-md text-[14px] flex items-center justify-center font-black pb-0.5 transition-all">-</button>
                            <span class="text-xs font-bold w-4 text-center text-stone-800">${item.qty}</span>
                            <button onclick="addQty(${index})" class="w-6 h-6 bg-[#634832] text-white rounded-md text-[14px] flex items-center justify-center font-black pb-0.5 active:scale-90 transition-all">+</button>
                        </div>
                    </div>
                </div>`;
            });

            const subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const ppn = subtotal * 0.10;
            document.getElementById('modal-subtotal').innerText = `Rp${subtotal.toLocaleString()}`;
            document.getElementById('modal-ppn').innerText = `Rp${ppn.toLocaleString()}`;
            document.getElementById('modal-total-price').innerText = `Rp${(subtotal + ppn).toLocaleString()}`;
        }

        function addQty(index) {
            cart[index].qty += 1;
            updateTotalBar();
            renderCartItems();
        }

        function updateNote(index, value) {
            cart[index].note = value; 
        }

        function reduceFromCart(index) {
            if (cart[index].qty > 1) {
                cart[index].qty -= 1;
            } else {
                cart.splice(index, 1);
            }
            updateTotalBar();
            renderCartItems();
        }

        function checkout() {
            if(cart.length === 0) return alert("Keranjang masih kosong!");
            const id = "ORD-" + Date.now().toString().slice(-4);
            const subtotal = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const ppn = subtotal * 0.10;
            const grandTotal = subtotal + ppn;

            socket.emit('submit_order', { 
                id: id, items: cart, table: tableNumber, user: customerName,
                total: grandTotal 
            });

            sessionStorage.setItem('last_order_id', id);
            sessionStorage.setItem('last_order_items', JSON.stringify(cart));
            sessionStorage.setItem('last_order_subtotal', subtotal);
            sessionStorage.setItem('last_order_ppn', ppn);
            sessionStorage.setItem('last_order_total', grandTotal);

            setTimeout(() => { window.location.href = "checkout-pending.html"; }, 500);
        }
    </script>
</body>
</html>
