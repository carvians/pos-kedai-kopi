<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Monitor | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    if (!sessionStorage.getItem('is_logged_in')) window.location.replace("staff-login.html");
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
    body { background-color: #09090b; color: #fafafa; }
    .bento-card {
        background: linear-gradient(145deg, #18181b, #09090b);
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .bento-card:hover {
        border-color: rgba(255,255,255,0.2);
        box-shadow: 0 0 30px rgba(255,255,255,0.05);
    }
    .status-badge {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.2);
        color: #4ade80;
    }
    .order-card {
        background: #111113;
        border: 1px solid #27272a;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    /* Animasi loading yang lebih cantik */
    .pulse-gold { animation: pulse 2s infinite; }
    @keyframes pulse {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
    }
</style>

<script>
    // ... bagian socket receive_stand_accounts ...
    stands.forEach((s, index) => {
        const colors = ['from-orange-500', 'from-blue-500', 'from-purple-500', 'from-emerald-500'];
        const color = colors[index % colors.length];
        container.innerHTML += `
            <button onclick="loginStand('${s.name}')" class="bento-card group relative p-8 rounded-[2.5rem] flex flex-col items-center justify-center gap-6 overflow-hidden h-52">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-gradient-to-br ${color} to-transparent opacity-10 blur-2xl group-hover:opacity-30 transition-all"></div>
                <div class="w-20 h-20 rounded-3xl bg-stone-900 flex items-center justify-center text-4xl shadow-inner group-hover:scale-110 transition-transform duration-500">
                    🏬
                </div>
                <div class="text-center">
                    <p class="font-black text-white text-sm uppercase tracking-[0.2em] mb-1">${s.name}</p>
                    <p class="text-[9px] text-stone-500 font-bold uppercase tracking-widest">Tap to Authenticate</p>
                </div>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r ${color} to-transparent opacity-0 group-hover:opacity-100 transition-all"></div>
            </button>
        `;
    });
</script>
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col text-stone-300">

    <div id="setup-stand" class="fixed inset-0 bg-[#0c0c0e]/95 backdrop-blur-md z-50 flex flex-col items-center justify-center p-6">
        <div class="glass-panel p-12 rounded-[3rem] border border-stone-800 shadow-2xl max-w-5xl w-full flex flex-col max-h-[90vh]">
            <div class="text-center mb-8 shrink-0">
                <div class="text-6xl mb-4 animate-bounce">👨‍🍳</div>
                <h2 class="text-3xl font-black text-white">Login Station Dapur</h2>
                <p class="text-stone-500 text-xs mt-2 uppercase tracking-widest">Pilih akun stand Anda:</p>
            </div>
            <div id="stand-buttons-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 overflow-y-auto pr-2 custom-scrollbar flex-1 content-start">
                </div>
        </div>
    </div>

    <header class="bg-[#121215] border-b border-stone-800 px-10 py-6 flex justify-between items-center z-40">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white">KITCHEN MONITOR</h1>
            <p class="text-[10px] text-orange-500 font-bold mt-1 uppercase tracking-widest">Aktif: <span id="active-stand" class="text-white">...</span></p>
        </div>
        <button onclick="location.reload()" class="bg-stone-800 px-5 py-2.5 rounded-xl text-xs font-bold transition-all">Ganti Station</button>
    </header>

    <main class="p-10 flex-1 overflow-y-auto">
        <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 auto-rows-max"></div>
    </main>

    <script>
        const socket = io();
        let MY_STAND = ""; 

        socket.emit('get_stand_accounts');
        
        socket.on('receive_stand_accounts', (stands) => {
            const container = document.getElementById('stand-buttons-container');
            container.innerHTML = ""; 
            const glowColors = ['from-orange-500', 'from-blue-500', 'from-emerald-500', 'from-rose-500'];
            
            stands.forEach((s, index) => {
                const bg = glowColors[index % glowColors.length];
                container.innerHTML += `
                    <button onclick="loginStand('${s.name}')" class="group relative bg-[#18181b] border border-stone-800 rounded-3xl p-8 transition-all hover:-translate-y-1 flex flex-col items-center justify-center gap-4 overflow-hidden h-44">
                        <div class="absolute inset-0 bg-gradient-to-br ${bg} to-stone-900 opacity-10"></div>
                        <div class="text-3xl">🏬</div>
                        <span class="font-black text-white text-xs uppercase tracking-widest">${s.name}</span>
                    </button>`;
            });
        });

        function loginStand(name) {
            const pass = prompt(`Masukkan Password untuk ${name}:`);
            if (pass) socket.emit('verify_stand_password', { stand: name, password: pass });
        }

        socket.on('verify_result', (res) => {
            if (res.success) {
                MY_STAND = res.stand;
                document.getElementById('setup-stand').classList.add('hidden');
                document.getElementById('active-stand').innerText = res.stand;
                socket.emit('request_stand_orders', MY_STAND);
            } else { alert(res.message); }
        });

        function renderOrderCard(order) {
            const myItems = order.items.filter(i => i.stand === MY_STAND);
            if(myItems.length === 0 || document.getElementById(`order-${order.id}`)) return;
            const card = document.createElement('div');
            card.id = `order-${order.id}`;
            card.className = "bg-[#18181b] border-l-4 border-orange-500 p-8 rounded-3xl shadow-2xl flex flex-col justify-between animate-in fade-in zoom-in duration-500";
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-4xl font-black text-white">#${order.id}</span>
                        <span class="bg-white text-stone-900 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Meja ${order.table}</span>
                    </div>
                    <ul class="mb-8 space-y-3">
                        ${myItems.map(i => `<li class="flex flex-col"><div class="flex items-center gap-3 text-sm font-bold text-stone-200"><span class="text-orange-500">${i.qty}x</span><span>${i.name}</span></div>${i.note ? `<p class="text-[10px] text-orange-300 mt-1 ml-7 italic">"${i.note}"</p>` : ''}</li>`).join('')}
                    </ul>
                </div>
                <button onclick="finishOrder('${order.id}')" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black tracking-widest active:scale-95 transition-all shadow-lg shadow-orange-900/20">SELESAI</button>
            `;
            document.getElementById('kitchen-grid').appendChild(card);
        }

        function finishOrder(id) {
            socket.emit('mark_stand_completed', { orderId: id, stand: MY_STAND });
            const card = document.getElementById(`order-${id}`);
            card.style.opacity = '0'; setTimeout(() => card.remove(), 300);
        }

        socket.on('order_paid_broadcast', (o) => {
            renderOrderCard(o);
            if(o.items.some(i => i.stand === MY_STAND)) new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3').play();
        });

        socket.on('load_stand_orders', (list) => list.forEach(o => renderOrderCard(o)));
    </script>
</body>
</html>
