<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Monitor | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    const isStaffLoggedIn = sessionStorage.getItem('is_logged_in');
    const staffRole = sessionStorage.getItem('staff_role');
    if (!isStaffLoggedIn || !staffRole) {
        window.location.replace("staff-login.html");
    }
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0c0c0e; color: #e7e5e4; }
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(20px); }
        .neon-shadow { box-shadow: 0 0 40px rgba(234, 88, 12, 0.15); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121215; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        
        /* Kustomisasi scrollbar khusus grid stand */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #ea580c; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="setup-stand" class="fixed inset-0 bg-[#0c0c0e]/95 backdrop-blur-md z-50 flex flex-col items-center justify-center p-4 md:p-10 transition-opacity duration-500">
        <div class="glass-panel p-8 md:p-12 rounded-[3rem] border border-stone-800 shadow-2xl max-w-5xl w-full neon-shadow flex flex-col max-h-[90vh]">
            
            <div class="text-center mb-8 shrink-0">
                <div class="text-6xl mb-4 drop-shadow-2xl animate-bounce">👨‍🍳</div>
                <h2 class="text-3xl md:text-4xl font-black tracking-tight text-white mb-2">Pilih Station Dapur</h2>
                <p class="text-stone-400 text-xs md:text-sm font-bold uppercase tracking-widest">Tersedia <span id="stand-count" class="text-orange-500">0</span> monitor stand aktif</p>
            </div>
            
            <div id="stand-buttons-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 overflow-y-auto pr-2 pb-4 custom-scrollbar flex-1 content-start">
                <p class="text-stone-500 animate-pulse text-sm text-center col-span-full py-10">Menghubungkan ke server pusat...</p>
            </div>

        </div>
    </div>

    <header class="bg-[#121215] border-b border-stone-800 px-6 md:px-10 py-5 flex justify-between items-center z-40 shadow-md">
        <div>
            <h1 class="text-2xl md:text-3xl font-black italic tracking-tighter text-white flex items-center gap-2">
                KITCHEN <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-amber-400">MONITOR</span>
            </h1>
            <p class="text-[10px] text-stone-500 font-bold mt-1 uppercase tracking-widest flex items-center gap-2">
                Station Aktif: <span id="active-stand" class="text-white bg-stone-800 px-2 py-1 rounded border border-stone-700 ml-1">...</span>
            </p>
        </div>
        
        <div class="flex gap-3 items-center">
            <div class="bg-green-500/10 text-green-400 px-4 py-2 rounded-xl text-[10px] font-black border border-green-500/20 animate-pulse tracking-widest flex items-center gap-2 shadow-[0_0_15px_rgba(34,197,94,0.1)] hidden md:flex">
                <div class="w-2 h-2 bg-green-400 rounded-full"></div> LIVE SYNC
            </div>
            <button onclick="logout()" class="bg-stone-800 hover:bg-red-500/20 hover:text-red-400 hover:border-red-500/50 border border-stone-700 text-stone-300 px-5 py-2.5 rounded-xl text-xs font-bold transition-all active:scale-95">
                Keluar
            </button>
        </div>
    </header>

    <main class="p-6 md:p-10 flex-1 overflow-y-auto">
        <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-8 auto-rows-max">
        </div>
    </main>

    <script>
        const socket = io();
        let MY_STAND = ""; 

        // --- TARIK DAFTAR STAND OTOMATIS DARI DATABASE ---
        socket.emit('get_all_menu');
        
        socket.on('receive_all_menu', (menus) => {
            const uniqueStands = [...new Set(menus.map(m => m.stand))];
            const container = document.getElementById('stand-buttons-container');
            
            document.getElementById('stand-count').innerText = uniqueStands.length;
            container.innerHTML = ""; 
            
            const emojis = ['🍳', '☕', '🥤', '🍕', '🍜', '🍰', '🍣', '🥩', '🥗', '🍔'];
            const glowColors = [
                'from-orange-500 to-amber-500', 'from-blue-500 to-cyan-500', 
                'from-emerald-500 to-teal-500', 'from-rose-500 to-pink-500', 
                'from-purple-500 to-fuchsia-500', 'from-indigo-500 to-blue-500'
            ];
            
            uniqueStands.forEach((stand, index) => {
                const emoji = emojis[index % emojis.length]; 
                const bgGradient = glowColors[index % glowColors.length];
                
                container.innerHTML += `
                    <button onclick="selectStand('${stand}')" class="group relative bg-[#18181b] border border-stone-800 hover:border-stone-600 rounded-3xl p-6 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_30px_-10px_rgba(255,255,255,0.1)] flex flex-col items-center justify-center gap-4 overflow-hidden h-40">
                        
                        <div class="absolute inset-0 bg-gradient-to-br ${bgGradient} opacity-0 group-hover:opacity-10 transition-opacity duration-300"></div>

                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${bgGradient} opacity-30 group-hover:opacity-100 transition-opacity"></div>

                        <div class="w-16 h-16 rounded-2xl bg-stone-900 border border-stone-700 flex items-center justify-center text-3xl shadow-inner group-hover:scale-110 transition-transform duration-300 relative z-10">
                            ${emoji}
                        </div>
                        
                        <span class="font-bold text-stone-400 group-hover:text-white text-[11px] uppercase tracking-widest text-center leading-tight relative z-10 transition-colors">
                            ${stand}
                        </span>
                    </button>
                `;
            });
        });

        socket.on('menu_updated_broadcast', () => socket.emit('get_all_menu'));

        function selectStand(standName) {
            MY_STAND = standName;
            document.getElementById('setup-stand').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('setup-stand').classList.add('hidden');
            }, 500);
            document.getElementById('active-stand').innerText = standName;

            socket.emit('request_stand_orders', MY_STAND);
        }

        function renderOrderCard(order) {
            const myItems = order.items.filter(i => i.stand === MY_STAND);
            if(myItems.length === 0) return; 

            if(document.getElementById(`stand-order-${order.id}`)) return;

            const card = document.createElement('div');
            card.id = `stand-order-${order.id}`;
            card.className = "bg-[#18181b] border border-stone-800 p-7 rounded-[2.5rem] shadow-2xl flex flex-col justify-between animate-in fade-in zoom-in slide-in-from-bottom-8 duration-500 relative overflow-hidden group hover:border-stone-700 transition-colors";
            
            card.innerHTML = `
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-orange-600 to-amber-400 opacity-80"></div>
                
                <div>
                    <div class="flex justify-between items-start mb-6 mt-1">
                        <div>
                            <span class="text-4xl font-black text-white tracking-tight">#${order.id}</span>
                            <p class="text-[10px] text-stone-500 font-bold mt-2 uppercase tracking-widest flex items-center gap-2">
                                <svg class="w-3 h-3 text-stone-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                                <span class="text-amber-400 text-xs">${order.user}</span>
                            </p>
                        </div>
                        <span class="bg-white text-stone-900 px-4 py-2 rounded-xl text-[11px] font-black tracking-widest shadow-[0_5px_15px_rgba(255,255,255,0.15)]">MEJA ${order.table}</span>
                    </div>
                    
                    <div class="w-full h-px bg-stone-800 mb-5"></div>
                    
                    <ul class="mb-8 space-y-4">
                        ${myItems.map(i => `
                        <li class="flex flex-col">
                            <div class="flex items-start gap-3 text-sm font-bold text-stone-200">
                                <span class="bg-stone-800 border border-stone-700 text-amber-500 w-7 h-7 flex items-center justify-center rounded-lg text-xs shrink-0 mt-0.5">${i.qty || 1}x</span> 
                                <span class="leading-snug text-base">${i.name}</span>
                            </div>
                            ${i.note ? `
                            <div class="mt-2 ml-10">
                                <p class="text-[11px] text-orange-300 font-medium bg-orange-900/30 inline-block px-3 py-1.5 rounded-lg border border-orange-500/20 shadow-sm flex items-center gap-1.5">
                                    <span class="text-sm">📝</span> ${i.note}
                                </p>
                            </div>` : ''}
                        </li>`).join('')}
                    </ul>
                </div>
                
                <button onclick="finishOrder('${order.id}')" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-amber-500 text-white py-4 md:py-5 rounded-2xl font-black text-xs md:text-sm tracking-widest transition-all active:scale-95 shadow-[0_0_20px_rgba(234,88,12,0.3)] hover:shadow-[0_0_25px_rgba(234,88,12,0.5)]">
                    ✔ SELESAI DIMASAK
                </button>
            `;
            document.getElementById('kitchen-grid').appendChild(card);
        }

        function finishOrder(orderId) {
            socket.emit('mark_stand_completed', { orderId: orderId, stand: MY_STAND });
            
            const card = document.getElementById(`stand-order-${orderId}`);
            card.style.transform = 'scale(0.9)';
            card.style.opacity = '0';
            setTimeout(() => card.remove(), 300);
        }

        socket.on('order_paid_broadcast', (order) => {
            renderOrderCard(order);
            const myItems = order.items.filter(i => i.stand === MY_STAND);
            if(myItems.length > 0) new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3').play();
        });

        socket.on('load_stand_orders', (ordersList) => {
            ordersList.forEach(order => renderOrderCard(order));
        });

        function logout() {
            sessionStorage.clear();
            window.location.replace("staff-login.html");
        }
    </script>
</body>
</html>
