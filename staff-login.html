<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Staff | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #3d2b1f; color: white; }
        
        /* Form Estetik (Sama dengan Admin) */
        .neo-input {
            background-color: #f5f3f0;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 1rem;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .neo-input:focus {
            background-color: #ffffff;
            border-color: #634832;
            outline: none;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.01), 0 0 10px rgba(99, 72, 50, 0.2);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-96 bg-orange-500 opacity-20 blur-[100px] rounded-full pointer-events-none"></div>

    <div class="bg-white text-stone-800 p-10 rounded-[3rem] shadow-2xl w-full max-w-md animate-in fade-in slide-in-from-bottom-8 duration-500 relative z-10 border border-white/20">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-500 to-[#634832]"></div>

        <div class="text-center mb-10 mt-2">
            <div class="w-16 h-16 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-5 shadow-inner">🔐</div>
            <h1 class="text-3xl font-black text-[#3d2b1f] tracking-tight">Portal Staff</h1>
            <p class="text-[10px] text-stone-400 font-bold uppercase tracking-widest mt-2">Sistem Manajemen Terpadu</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-[#634832] uppercase tracking-widest ml-2">Tujuan Akses</label>
                <select id="login-type" onchange="toggleForm()" class="w-full mt-1 text-stone-700 text-sm neo-input block p-4 font-bold cursor-pointer">
                    <option value="staff">💳 Admin Pusat / Kasir</option>
                    <option value="stand">👨‍🍳 Kitchen Monitor (Dapur)</option>
                </select>
            </div>

            <div id="staff-form" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-[#634832] uppercase tracking-widest ml-2">Username Staff</label>
                    <input type="text" id="username" class="w-full mt-1 text-stone-800 text-sm neo-input block p-4 font-bold placeholder-stone-400" placeholder="Ketik username Anda...">
                </div>

                <div>
                    <label class="text-[10px] font-black text-[#634832] uppercase tracking-widest ml-2">Password</label>
                    <input type="password" id="password" class="w-full mt-1 text-stone-800 text-sm neo-input block p-4 font-bold placeholder-stone-400" placeholder="Ketik password Anda...">
                </div>
            </div>

            <button onclick="login()" class="w-full bg-gradient-to-r from-[#634832] to-[#3d2b1f] hover:from-[#3d2b1f] hover:to-black text-white font-black tracking-widest rounded-2xl text-xs px-5 py-5 text-center transition-all mt-4 shadow-[0_10px_20px_rgba(61,43,31,0.3)] active:scale-95">
                OTORISASI AKSES
            </button>
        </div>
    </div>

    <script>
        const socket = io();

        // Menyembunyikan form password jika yang mau masuk adalah layar Dapur
        function toggleForm() {
            const type = document.getElementById('login-type').value;
            const form = document.getElementById('staff-form');
            if(type === 'stand') {
                form.style.display = 'none';
            } else {
                form.style.display = 'block';
            }
        }

        function login() {
            const type = document.getElementById('login-type').value;

            // 1. JIKA KE DAPUR (Langsung masuk karena dapur punya password per-stand di dalamnya)
            if(type === 'stand') {
                sessionStorage.setItem('staff_role', 'stand');
                sessionStorage.setItem('is_logged_in', 'true');
                window.location.href = "stand.html";
                return;
            }

            // 2. JIKA ADMIN / KASIR (Validasi ke server)
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if(!username || !password) return alert("⚠️ Username dan Password wajib diisi!");

            // Kirim data ke server (Sekarang pakai Username)
            socket.emit('attempt_staff_login', { username, password });
        }

        // Terima jawaban dari server
        socket.on('staff_login_result', (response) => {
            if (response.success) {
                // Simpan "Tiket Masuk" dan NAMA KASIR di browser
                sessionStorage.setItem('staff_role', response.role);
                sessionStorage.setItem('staff_username', response.username); // Penting untuk Excel!
                sessionStorage.setItem('is_logged_in', 'true');
                
                // Arahkan ke halaman masing-masing
                if (response.role === 'admin') window.location.href = "admin.html";
                if (response.role === 'kasir') window.location.href = "kasir.html";
            } else {
                alert("❌ " + response.message);
                document.getElementById('password').value = ""; 
            }
        });
    </script>
</body>
</html>
