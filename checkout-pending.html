<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selesaikan Pembayaran | POS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf7; }
        .timer-circle { transition: stroke-dashoffset 1s linear; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-6">

    <div class="w-full max-w-md bg-white p-8 rounded-[3rem] shadow-2xl text-center border border-stone-100">
        
        <h2 class="text-stone-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Batas Waktu Pembayaran</h2>
        
        <div class="relative flex items-center justify-center my-6">
            <svg class="w-32 h-32 transform -rotate-90">
                <circle cx="64" cy="64" r="56" stroke="currentColor" stroke-width="8" fill="transparent" class="text-stone-100" />
                <circle id="timer-bar" cx="64" cy="64" r="56" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="352" stroke-dashoffset="0" class="text-[#634832] timer-circle" />
            </svg>
            <div class="absolute text-2xl font-black text-stone-800" id="timer-text">15:00</div>
        </div>

        <div class="mb-6">
            <p class="text-[10px] font-black text-stone-400 tracking-widest uppercase">ID PESANAN ANDA</p>
            <h1 class="text-3xl font-black text-[#3d2b1f] mt-1" id="order-id-display">ORD-0000</h1>
        </div>

        <div class="bg-stone-50 p-6 rounded-3xl border border-dashed border-stone-200 mb-8 text-left">
            <h3 class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-4">Rincian Pesanan</h3>
            
            <div id="order-items-list" class="space-y-3 mb-4 border-b border-stone-200 pb-4 max-h-40 overflow-y-auto no-scrollbar">
                </div>

            <div class="space-y-2 mb-4 border-b border-stone-200 pb-4">
                <div class="flex justify-between text-xs font-bold text-stone-500">
                    <span>Subtotal</span>
                    <span id="subtotal-display">Rp0</span>
                </div>
                <div class="flex justify-between text-xs font-bold text-stone-500">
                    <span>PPN (11%)</span>
                    <span id="ppn-display">Rp0</span>
                </div>
            </div>

            <div class="flex justify-between items-end">
                <span class="text-[10px] font-black text-stone-400 tracking-widest uppercase">TOTAL BAYAR</span>
                <span class="text-2xl font-black text-orange-600" id="total-display">Rp0</span>
            </div>
        </div>

        <p class="text-xs text-stone-500 font-bold leading-relaxed mb-6">
            Silakan tunjukkan layar ini ke <span class="text-[#634832] font-black">Kasir Pusat</span> untuk memproses pesanan Anda.
        </p>

        <button onclick="window.location.href='index.html'" class="text-[#634832] font-bold text-xs uppercase tracking-widest underline opacity-50 hover:opacity-100 transition-all">
            &larr; Batal & Kembali ke Menu
        </button>
    </div>

    <script>
        // Ambil data dari Session Storage
        const orderId = sessionStorage.getItem('last_order_id');
        const items = JSON.parse(sessionStorage.getItem('last_order_items') || '[]');
        const subtotal = parseInt(sessionStorage.getItem('last_order_subtotal') || 0);
        const ppn = parseInt(sessionStorage.getItem('last_order_ppn') || 0);
        const total = parseInt(sessionStorage.getItem('last_order_total') || 0);

        // Jika tidak ada order ID, tendang balik ke menu
        if (!orderId) window.location.href = "index.html";

        // Tampilkan Teks
        document.getElementById('order-id-display').innerText = orderId;
        document.getElementById('subtotal-display').innerText = `Rp${subtotal.toLocaleString()}`;
        document.getElementById('ppn-display').innerText = `Rp${ppn.toLocaleString()}`;
        document.getElementById('total-display').innerText = `Rp${total.toLocaleString()}`;

        // Render Rincian Item
        const itemsContainer = document.getElementById('order-items-list');
        items.forEach(item => {
            itemsContainer.innerHTML += `
                <div class="flex justify-between items-start text-sm">
                    <div>
                        <p class="font-bold text-stone-800 leading-tight">${item.name}</p>
                        <p class="text-[9px] font-bold text-stone-400 uppercase tracking-widest">${item.stand.replace('_', ' ')}</p>
                    </div>
                    <span class="font-bold text-stone-600">Rp${item.total.toLocaleString()}</span>
                </div>
            `;
        });

        // LOGIKA TIMER (15 Menit)
        let timeLeft = 15 * 60; // 15 Menit dalam detik
        const totalTime = 15 * 60;
        const timerText = document.getElementById('timer-text');
        const timerBar = document.getElementById('timer-bar');

        const countdown = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            timerText.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            // Animasi Lingkaran Timer (352 adalah panjang keliling lingkaran SVG)
            const offset = 352 - (timeLeft / totalTime) * 352;
            timerBar.style.strokeDashoffset = offset;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert("Waktu habis! Silakan pesan ulang.");
                window.location.href = "index.html";
            }
            timeLeft--;
        }, 1000);
    </script>
</body>
</html>
