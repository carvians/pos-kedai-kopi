<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selesaikan Pembayaran | Foodcourt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfaf7; }
        .timer-circle { transition: stroke-dashoffset 1s linear; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-8">

    <div class="w-full max-w-md bg-white p-10 rounded-[3rem] shadow-2xl text-center border border-stone-100">
        <h2 class="text-stone-400 text-xs font-black uppercase tracking-[0.2em] mb-2">Batas Waktu Bayar</h2>
        
        <div class="relative flex items-center justify-center my-8">
            <svg class="w-48 h-48 transform -rotate-90">
                <circle cx="96" cy="96" r="88" stroke="currentColor" stroke-width="8" fill="transparent" class="text-stone-100" />
                <circle id="timer-bar" cx="96" cy="96" r="88" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="552" stroke-dashoffset="0" class="text-[#634832] timer-circle" />
            </svg>
            <div class="absolute text-4xl font-black text-stone-800" id="timer-text">15:00</div>
        </div>

        <div class="mb-8">
            <p class="text-stone-400 text-sm">ID PESANAN</p>
            <h1 class="text-2xl font-black text-[#3d2b1f]" id="order-id-display">ORD-0000</h1>
        </div>

        <div class="bg-stone-50 p-6 rounded-3xl border border-dashed border-stone-200 mb-8">
            <p class="text-xs text-stone-400 mb-1">TOTAL YANG HARUS DIBAYAR</p>
            <p class="text-2xl font-bold text-orange-600" id="total-display">Rp0</p>
        </div>

        <p class="text-xs text-stone-500 leading-relaxed mb-8">
            Silakan tunjukkan ID Pesanan di atas ke **Kasir Pusat** untuk memproses pesanan Anda.
        </p>

        <button onclick="window.location.href='index.html'" class="text-[#634832] font-bold text-sm underline opacity-50 hover:opacity-100 transition-all">
            Batal & Pesan Ulang
        </button>
    </div>

    <script>
        const orderId = sessionStorage.getItem('last_order_id');
        const total = sessionStorage.getItem('last_order_total');

        if (!orderId) window.location.href = "index.html";

        document.getElementById('order-id-display').innerText = orderId;
        document.getElementById('total-display').innerText = `Rp${parseInt(total).toLocaleString()}`;

        // LOGIKA TIMER (15 Menit)
        let timeLeft = 15 * 60; // dalam detik
        const totalTime = 15 * 60;
        const timerText = document.getElementById('timer-text');
        const timerBar = document.getElementById('timer-bar');

        const countdown = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            timerText.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            // Animasi Lingkaran
            const offset = 552 - (timeLeft / totalTime) * 552;
            timerBar.style.strokeDashoffset = offset;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert("Waktu habis! Silakan pesan ulang.");
                window.location.href = "index.html";
            }
            timeLeft--;
        }, 1000);
    </script>
</body>
</html>
